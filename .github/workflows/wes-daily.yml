name: Daily WES Message

on:
  # 09:00 America/Sao_Paulo (BRT, UTC-3) -> 12:00 UTC.
  # Note: GitHub cron is best-effort and may run 5-15 minutes late.
  schedule:
    - cron: '0 12 * * *'
  # Allow manual runs from the Actions tab for testing.
  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Pick today's message
        id: pick
        run: |
          MESSAGE="$(python3 scripts/pick_message.py)"
          {
            echo "message<<EOF"
            echo "$MESSAGE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send to Discord
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
          username: 'WES 🗿'
          content: ${{ steps.pick.outputs.message }}
